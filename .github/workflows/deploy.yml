name: Deploy Production (Hostinger SSH)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/tag/SHA)"
        required: false
        default: "main"
      run_migrations:
        description: "Run database migrations"
        required: false
        type: boolean
        default: true
      sync_static_media:
        description: "Sync public/rjs-photos static media"
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, ctype, fileinfo, json, openssl, pdo, sqlite, pdo_sqlite, tokenizer, xml
          coverage: none

      - name: Audit Composer dependencies
        run: composer audit --no-interaction

      - name: Install Composer dependencies (no-dev)
        uses: ramsey/composer-install@v4
        with:
          composer-options: "--no-dev --prefer-dist --no-interaction --optimize-autoloader"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -R "[${SSH_HOST}]:${SSH_PORT:-22}" || true
          ssh-keyscan -p "${SSH_PORT:-22}" -t rsa -H "$SSH_HOST" >> ~/.ssh/known_hosts
     
      - name: Sync Laravel core
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          CORE_PATH: ${{ secrets.HOSTINGER_CORE_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${SSH_PORT:-22} -o Compression=no -c aes256-ctr -m hmac-sha2-256-etm@openssh.com" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "node_modules/" \
            --exclude "public/hot" \
            --exclude "public/rjs-photos/" \
            --exclude "public/storage" \
            --exclude "storage/" \
            ./ "${SSH_USER}@${SSH_HOST}:${CORE_PATH}/"

      - name: Sync public build assets
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          PUBLIC_PATH: ${{ secrets.HOSTINGER_PUBLIC_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${SSH_PORT:-22} -o Compression=no -c aes256-ctr -m hmac-sha2-256-etm@openssh.com" \
            public/build/ "${SSH_USER}@${SSH_HOST}:${PUBLIC_PATH}/build/"

      - name: Sync static public media
        if: ${{ inputs.sync_static_media }}
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          PUBLIC_PATH: ${{ secrets.HOSTINGER_PUBLIC_PATH }}
        run: |
          rsync -az \
            -e "ssh -p ${SSH_PORT:-22} -o Compression=no -c aes256-ctr -m hmac-sha2-256-etm@openssh.com" \
            public/rjs-photos/ "${SSH_USER}@${SSH_HOST}:${PUBLIC_PATH}/rjs-photos/"

      - name: Sync public root assets
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          PUBLIC_PATH: ${{ secrets.HOSTINGER_PUBLIC_PATH }}
        run: |
          rsync -az \
            -e "ssh -p ${SSH_PORT:-22} -o Compression=no -c aes256-ctr -m hmac-sha2-256-etm@openssh.com" \
            public/apple-touch-icon.png \
            public/favicon.ico \
            public/raja.svg \
            public/rajaori.svg \
            public/rajawhite.svg \
            public/robots.txt \
            "${SSH_USER}@${SSH_HOST}:${PUBLIC_PATH}/"

      - name: Run remote post-deploy commands
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          CORE_PATH: ${{ secrets.HOSTINGER_CORE_PATH }}
          PUBLIC_PATH: ${{ secrets.HOSTINGER_PUBLIC_PATH }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
        run: |
          ssh -p "${SSH_PORT:-22}" -o Compression=no -c aes256-ctr -m hmac-sha2-256-etm@openssh.com "${SSH_USER}@${SSH_HOST}" \
            "CORE_PATH='${CORE_PATH}' PUBLIC_PATH='${PUBLIC_PATH}' RUN_MIGRATIONS='${RUN_MIGRATIONS}' bash -s" <<'EOF'
          set -euo pipefail
          cd "${CORE_PATH}"

          mkdir -p \
            storage/app/public \
            storage/framework/cache \
            storage/framework/sessions \
            storage/framework/views \
            storage/logs \
            bootstrap/cache

          if [ "${RUN_MIGRATIONS}" = "true" ]; then
            php artisan migrate --force
          fi

          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

          if [ -L "${PUBLIC_PATH}/storage" ]; then
            rm "${PUBLIC_PATH}/storage"
            ln -s "${CORE_PATH}/storage/app/public" "${PUBLIC_PATH}/storage"
          elif [ -e "${PUBLIC_PATH}/storage" ]; then
            echo "::warning::${PUBLIC_PATH}/storage exists and is not a symlink. Leaving it untouched to protect production uploads."
          else
            ln -s "${CORE_PATH}/storage/app/public" "${PUBLIC_PATH}/storage"
          fi

          php artisan config:cache
          php artisan route:cache
          # view:cache is intentionally skipped; Livewire view paths make it slow on this project.

          php artisan queue:restart || true
          EOF

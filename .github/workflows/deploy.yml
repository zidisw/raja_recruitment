name: Deploy (SSH)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/tag/SHA)"
        required: false
        default: "main"
      run_migrations:
        description: "Run database migrations"
        required: false
        type: boolean
        default: true
      environment:
        description: "GitHub Environment name (for scoped secrets)"
        required: false
        default: "production"

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, ctype, fileinfo, json, openssl, pdo, sqlite, pdo_sqlite, tokenizer, xml
          coverage: none

      - name: Install Composer dependencies (no-dev)
        uses: ramsey/composer-install@v3
        with:
          composer-options: "--no-dev --prefer-dist --no-interaction --optimize-autoloader"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Rsync project to server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${SSH_PORT:-22}" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".env" \
            --exclude "storage/" \
            --exclude "node_modules/" \
            ./ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Run remote post-deploy commands
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' RUN_MIGRATIONS='${RUN_MIGRATIONS}' bash -s" <<'EOF'
          set -euo pipefail
          cd "${DEPLOY_PATH}"

          if [ ! -d vendor ] && command -v composer >/dev/null 2>&1; then
            composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
          fi

          if [ "${RUN_MIGRATIONS}" = "true" ]; then
            php artisan migrate --force
          fi

          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear

          php artisan config:cache
          php artisan view:cache

          php artisan queue:restart || true
          EOF
